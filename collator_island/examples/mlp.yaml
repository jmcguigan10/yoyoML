project:
  name: mlp_project

pipelines:
  - name: mlp_reg_demo
    kind: mlp
    enabled: true
    model:
      spec:
        input_dim: 20
        out_dim: 1
        task_type: regression
        hidden_dims: [64, 64]
        activation: gelu
        use_dropout: true
        dropout_p: 0.1
        use_layer_norm: true
    criterion:
      kind: mse
    data:
      dataset_kind: demo
      modality: tabular
      batch_size: 32
      num_workers: 0
